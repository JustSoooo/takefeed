# 监控 & 选股平台配置
# 全部权重/阈值/标的清单在此维护，禁止在代码中硬编码。
# 初期权重全部等权，跑 2-4 周人工复盘后再调整（见 guidebook 第 8 节 M2）。

market: us   # us | cn（cn 为二期，当前未实现）

anthropic:
  model: claude-sonnet-5
  max_tokens: 1024

# 11个 SPDR 板块 ETF，V1（板块轮动维度）和 V2（轮动追踪模块）共用同一份清单
sector_etfs:
  - { symbol: "XLK", name: "科技", style: cyclical }
  - { symbol: "XLY", name: "非必需消费", style: cyclical }
  - { symbol: "XLF", name: "金融", style: cyclical }
  - { symbol: "XLI", name: "工业", style: cyclical }
  - { symbol: "XLE", name: "能源", style: cyclical }
  - { symbol: "XLB", name: "材料", style: cyclical }
  - { symbol: "XLRE", name: "房地产", style: defensive }
  - { symbol: "XLP", name: "必需消费", style: defensive }
  - { symbol: "XLU", name: "公用事业", style: defensive }
  - { symbol: "XLV", name: "医疗", style: defensive }
  - { symbol: "XLC", name: "通信服务", style: cyclical }

v1:
  # 六维度权重，必须合计为 1.0。当某维度当日取数失败时会被剔除，
  # 剩余维度按原比例重新归一化（见 core/scoring/v1_composite.py）。
  weights:
    volatility: 0.1667
    trend: 0.1667
    breadth: 0.1667
    credit: 0.1667
    rotation: 0.1667
    sentiment: 0.1665

  # 三档状态阈值
  state_thresholds:
    defensive_below: 35
    aggressive_above: 65

  tickers:
    vix: "^VIX"
    vix9d: "^VIX9D"
    trend: ["SPY", "QQQ"]
    credit_risk_on: "HYG"
    credit_risk_off: "IEF"
    irx: "^IRX"

  # 广度指标起步用道指30（跑通逻辑后可扩展为标普500全量，见 guidebook 2.2）
  breadth_universe: dow30

  sentiment:
    aaii_url: "https://www.aaii.com/sentimentsurvey/sent_results"
    fear_greed_url: "https://production.dataviz.cnn.io/index/fearandgreed/graphdata"
    min_history_for_percentile: 20  # 样本不足时退化为阈值法而非百分位法

v2:
  benchmark: "SPY"
  # 三个窗口的交易日数：1周/1月/3月
  windows: { short: 5, mid: 21, long: 63 }
  # 持续性判断以 1 月窗口排名为准（guidebook 3.1："连续N周排名前3 = 强持续信号"，
  # 本系统按日巡检，用 trading-day 回看窗口近似"周"的概念）
  persistence:
    top_n: 3
    lookback_days: 20
    hit_ratio_threshold: 0.7
  internal_health:
    holdings_top_n: 15   # 用权重前15大持仓近似板块内部健康度，而非全量成分股
    strong_sector_count: 3  # 只对当前排名前3的板块计算内部健康度，控制取数量

# 候选池 watchlist，初期用户手工维护（guidebook 4.1）。source: config 时用下面的
# tickers 列表；source: csv 时改为读取 csv_path（单列 ticker，或 ticker,sector_etf 两列）。
watchlist:
  source: config
  csv_path: "data/watchlist.csv"
  tickers:
    - { ticker: "AAPL", sector_etf: "XLK" }
    - { ticker: "MSFT", sector_etf: "XLK" }
    - { ticker: "NVDA", sector_etf: "XLK" }

v3:
  windows: { mid: 21, long: 63 }  # 相对强度用 1月/3月
  news_lookback_days: 7
  news_max_headlines: 15
  upgrades_downgrades_lookback_days: 30
  earnings_soon_threshold_days: 5

v4:
  price_history_period: "6mo"  # 需覆盖 MA 计算 + 90日波动率窗口
  ma_windows: [20, 50]           # 均线突破/跌破规则（收盘确认，非盘中，guidebook 5.2）
  volume_spike_multiplier: 2.0
  volume_lookback_days: 30
  return_std_window: 90
  return_std_multiplier: 2.0
  news_spike_multiplier: 3.0
  news_spike_lookback_days: 30
  news_spike_min_history: 10   # 样本不足时跳过该规则而非报假警

fetcher:
  max_retries: 3
  backoff_base_seconds: 2
  history_period: "1y"

paths:
  db: "db/market.sqlite"
  reports_dir: "output/reports"
  site_dir: "output/site"
